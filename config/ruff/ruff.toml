# =============================================================================
# ruff.toml — Global ruff defaults
# Projects can override these in their own pyproject.toml or ruff.toml
# =============================================================================

line-length    = 100
target-version = "py311"
indent-width   = 4

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "N",    # pep8-naming
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "C4",   # flake8-comprehensions
  "RUF",  # ruff-specific rules
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "B008",   # do not perform function calls in default arguments (common in FastAPI/typer)
]

[lint.per-file-ignores]
"notebooks/**" = ["E402", "F401", "F811"]  # notebooks have different conventions
"tests/**"     = ["S101"]                   # asserts are fine in tests

[lint.isort]
known-first-party = ["src"]

[format]
quote-style              = "double"
indent-style             = "space"
skip-magic-trailing-comma = false
