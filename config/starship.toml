# =============================================================================
# starship.toml — Prompt configuration
# =============================================================================

add_newline = true  # breathing room between commands

format = """
$directory$git_branch$git_status$python$conda$aws$cmd_duration
$character"""

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
truncation_length    = 4
truncate_to_repo     = true
style                = "bold blue"

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style     = "bold red"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
modified  = "!${count}"
staged    = "+${count}"
untracked = "?${count}"
stashed   = "≡"

# ── Python ───────────────────────────────────────────────────────────────────
[python]
symbol               = " "
pyenv_version_name   = true
detect_files         = ["pyproject.toml", "requirements.txt", ".python-version", "*.py"]
style                = "bold yellow"
# Only show when virtualenv is active or .python-version exists
version_format       = "v${major}.${minor}"

# ── Conda ─────────────────────────────────────────────────────────────────────
[conda]
symbol = "🅒 "
style  = "bold green"
ignore_base = true  # don't show "base"

# ── AWS (shows profile to avoid costly mistakes) ──────────────────────────────
[aws]
symbol            = "☁️  "
style             = "bold orange"
format            = '[$symbol($profile)(\($region\))]($style) '
force_display     = false  # only show when AWS env vars are set

# ── Command duration (critical for ML jobs) ───────────────────────────────────
[cmd_duration]
min_time           = 2_000  # show if command took > 2 seconds
format             = "[ $duration]($style) "
style              = "bold yellow"
show_milliseconds  = false

# ── Character ────────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
